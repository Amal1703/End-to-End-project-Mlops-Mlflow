artifacts_root: artifacts # the root folder that contains the results of each pipeline step


# artifacts = produced results. artifacts are the files or folders generated by the pipeline
# for example: in step 1 "data_ingestion" of the pipeline, data.zip is an artifact
# and the CSV files inside data.zip are also artifacts

data_ingestion:  # downloads the data, saves it, and extracts the archive
  root_dir: artifacts/data_ingestion # indicates the working directory for the data ingestion step
  source_URL: https://raw.githubusercontent.com/Amal1703/End-to-End-project-Mlops-Mlflow/main/dataset/Housing.zip
  local_data_file: artifacts/data_ingestion/data.zip # local path where the downloaded data will be stored.
  unzip_dir: artifacts/data_ingestion

data_validation:  # ensures that the data is valid
  root_dir: artifacts/data_validation # indicates the working directory for the data validation step
  unzip_data_dir: artifacts/data_ingestion/Housing.csv # indicates the folder where the data is located
  STATUS_FILE: artifacts/data_validation/status.txt # validation status of data : if data is in correct format => validation status = true else false

data_transformation: # tdransforms the data: normalization, PCA, etc., and splits the data for training
  root_dir:  artifacts/data_transformation
  data_path: artifacts/data_ingestion/Housing.csv
  transf_data_file: artifacts/data_transformation/transf_data_file.csv # contains the information required for data normalization (e.g., mean, max, etc.)
  encoder_file: artifacts/data_transformation/encoder.pkl

model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/train.csv
  test_data_path: artifacts/data_transformation/test.csv
  model_name: model.joblib

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/test.csv
  model_path: artifacts/model_trainer
  metric_file_name: artifacts/model_evaluation/metrics.json  
  
prediction_new_data:
  model_path: artifacts/model_trainer/model4.joblib # path to the best model
  transf_data_file: artifacts/data_transformation/transf_data_file.csv
  encoder_file: artifacts/data_transformation/encoder.pkl

