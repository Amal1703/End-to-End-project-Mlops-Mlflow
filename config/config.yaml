artifacts_root: artifacts # le dossier racine qui contient les résultats de chaque étape du pipeline


# artifacts = résultats produites. Les artifacts sont les fichiers ou dossiers générés par le pipeline.
# Par exemple : dans étape 1 "data_ingestion" du pipline, data.zip est un artifact, les fichiers csv du data.zip sont des artifacts

data_ingestion:  # data_ingestion : Télécharge les données, Les sauvegarde et lesdézippe
  root_dir: artifacts/data_ingestion # Indique le dossier de travail pour l'étape d'ingestion.
  source_URL: https://github.com/entbappy/Branching-tutorial/raw/master/winequality-data.zip
  local_data_file: artifacts/data_ingestion/data.zip # Chemin local où sera enregistré les données téléchargé
  unzip_dir: artifacts/data_ingestion